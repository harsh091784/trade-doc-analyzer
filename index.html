<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeDoc Analyzer | Financial Document Compliance Dashboard</title>
  <meta name="description" content="Analyze invoices, bills of credit, letters of credit and trade documents against international rules and standards like UCP 600, ISBP 745, and ICC guidelines." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <rect width="28" height="28" rx="2" fill="#CC0000"/>
              <path d="M7 8h14v2H7zM7 13h10v2H7zM7 18h12v2H7z" fill="white"/>
            </svg>
          </div>
          <div class="logo-text">
            <span class="logo-name">TradeDoc</span>
            <span class="logo-sub">Analyzer</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="nav-label">Main</span>
          <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span>Dashboard</span>
          </a>
          <a href="#" class="nav-item" data-page="upload" id="nav-upload">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>Upload & Analyze</span>
          </a>
          <a href="#" class="nav-item" data-page="history" id="nav-history">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>Analysis History</span>
          </a>
        </div>
        <div class="nav-section">
          <span class="nav-label">Reference</span>
          <a href="#" class="nav-item" data-page="standards" id="nav-standards">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
            <span>Standards & Rules</span>
          </a>
          <a href="#" class="nav-item" data-page="settings" id="nav-settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <span>Settings</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">HC</div>
          <div class="user-details">
            <span class="user-name">Harsh C.</span>
            <span class="user-role">Admin</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <!-- Top Bar -->
      <header class="topbar">
        <button class="menu-toggle" id="menuToggle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-left">
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
          <span class="page-breadcrumb" id="pageBreadcrumb">Overview & Analytics</span>
        </div>
        <div class="topbar-right">
          <div class="search-box" id="searchBox">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search documents..." id="searchInput" />
          </div>
          <button class="notification-btn" id="notificationBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span class="notification-badge">3</span>
          </button>
        </div>
      </header>

      <!-- Page Container -->
      <div class="page-container" id="pageContainer">
        <!-- Dashboard Page -->
        <div class="page active" id="page-dashboard"></div>
        <!-- Upload Page -->
        <div class="page" id="page-upload"></div>
        <!-- History Page -->
        <div class="page" id="page-history"></div>
        <!-- Standards Page -->  
        <div class="page" id="page-standards"></div>
        <!-- Settings Page -->
        <div class="page" id="page-settings"></div>
      </div>
    </main>
  </div>

  <!-- Analysis Modal -->
  <div class="modal-overlay" id="analysisModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Document Analysis Results</h2>
        <button class="modal-close" id="modalClose">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
